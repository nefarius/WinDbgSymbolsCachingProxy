name: .NET

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup .Net SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build -c Release

  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup .Net SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # WiX 6+ default `wix` mismatches WixToolset.UI.wixext versions WixSharp resolves; pin WiX 5 + matching UI extension.
      - name: Install WiX CLI and UI extension
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2

      - name: NUKE BuildInstaller
        run: .\build.ps1 BuildInstaller

      - name: Upload MSI artifact
        id: upload-msi
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-msi
          path: publish-x64/installer/*.msi

      - name: Send webhook to Buildbot
        if: success() && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          $artifactId = "${{ steps.upload-msi.outputs.artifact-id }}"
          $artifactUrl = "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${artifactId}/zip"
          $repo = "${{ github.event.repository.name }}"
          $refName = "${{ github.ref_name }}"
          $payload = @{
            artifacts = @(
              @{
                fileName = "$repo.zip"
                url      = $artifactUrl
              }
            )
            environmentVariables = @{
              appveyor_project_name  = $repo
              appveyor_repo_branch   = $refName
              appveyor_build_version = $refName
            }
          } | ConvertTo-Json -Compress -Depth 10
          Invoke-RestMethod -Uri $env:WEBHOOK_URL -Method Post -Body $payload -ContentType "application/json" -Headers @{
            "X-GitHub-Token" = "${{ secrets.GITHUB_TOKEN }}"
          }
